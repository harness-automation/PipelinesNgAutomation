template:
  name: stepTemplate_featurebranch
  identifier: stepTemplate_featurebranch
  versionLabel: v1
  type: Step
  projectIdentifier: naidusanity
  orgIdentifier: default
  tags: {}
  spec:
    timeout: 10m
    type: ShellScript
    spec:
      shell: Bash
      executionTarget: {}
      delegateSelectors: []
      source:
        type: Inline
        spec:
          script: <+input>
      environmentVariables: []
      outputVariables: []
    failureStrategies:
      - onFailure:
          errors:
            - Authentication
          action:
            type: Ignore
      - onFailure:
          errors:
            - Authorization
            - DelegateProvisioning
          action:
            type: MarkAsSuccess
